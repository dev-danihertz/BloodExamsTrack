<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BloodExamsTrack</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; }
        body { font-family: system-ui; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .user-info { font-size: 0.9rem; color: #64748b; display: flex; gap: 10px; align-items: center; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; }
        .tab-btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; background: #e2e8f0; font-weight: bold; white-space: nowrap; }
        .tab-btn.active { background: var(--primary); color: white; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; align-items: end; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        input, select { padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        button.main { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; margin-top: 10px; }
        button.secondary { background: #f1f5f9; color: #475569; border: 1px solid #cbd5e1; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
        .hidden { display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #f1f5f9; }
        th { background: #f8fafc; color: #64748b; font-size: 0.85rem; cursor: pointer; user-select: none; }
        th:hover { background: #f1f5f9; color: var(--primary); }
        .chart-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .chart-content.collapsed { display: none; }
        .controls-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .duplicate-highlight { background-color: #fef9c3 !important; border-left: 4px solid #facc15; }

        /* Login Overlay */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-card { background: white; padding: 30px; border-radius: 12px; width: 300px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .login-card h2 { margin-top: 0; color: var(--primary); }
        .login-toggle { margin-top: 15px; text-align: center; font-size: 0.85rem; }
        .login-toggle span { color: var(--primary); cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>
    <!-- OVERLAY DE LOGIN -->
    <div id="login-overlay" class="hidden">
        <div class="login-card">
            <h2 id="login-title">Entrar</h2>
            <form id="loginForm" style="display: flex; flex-direction: column; gap: 15px;">
                <div class="form-group">
                    <label>Usuário</label>
                    <select id="login_user" required style="padding: 10px; font-size: 1rem;">
                        <option value="DANHERTZ">DANHERTZ</option>
                        <option value="GISIHERTZ">GISIHERTZ</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="login_pass" required>
                </div>
                <button type="submit" class="main" id="login_submit">Entrar</button>
            </form>
        </div>
    </div>

    <div class="container">
        <div class="header-row">
            <h1>🩸 BloodExamsTrack</h1>
            <div id="user-display" class="user-info hidden">
                <span id="current-user-name"></span>
                <button class="secondary" onclick="logout()">Sair</button>
            </div>
        </div>
        
        <div id="main-content" class="hidden">
            <div class="tabs" id="main-tabs">
                <button class="tab-btn active" id="btn-dashboard" onclick="showTab('dashboard')">Dashboard</button>
                <button class="tab-btn" id="btn-exams" onclick="showTab('exams')">Histórico/Novo</button>
                <button class="tab-btn" id="btn-markers" onclick="showTab('markers')">Configurar Marcadores</button>
            </div>

            <!-- ABA DASHBOARD (GRÁFICOS) -->
            <div id="tab-dashboard">
                <div id="chartsContainer"></div>
            </div>

            <!-- ABA HISTÓRICO / NOVO -->
            <div id="tab-exams" class="hidden">
                <div class="card">
                    <h3 id="examFormTitle">Novo Registro de Exame</h3>
                    <form id="examForm" class="form-row">
                        <input type="hidden" id="edit_exam_id">
                        <div class="form-group">
                            <label>Data</label>
                            <input type="date" id="exam_date" required>
                        </div>
                        <div class="form-group">
                            <label>Marcador</label>
                            <select id="exam_marker" required>
                                <option value="">Selecione...</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Valor</label>
                            <input type="number" step="0.01" id="exam_value" required>
                        </div>
                        <button type="submit" class="main" id="exam_submit">Salvar</button>
                        <button type="button" class="secondary hidden" id="exam_cancel" onclick="cancelExamEdit()">Cancelar</button>
                    </form>
                </div>

                <div class="card">
                    <h3>Histórico de Registros</h3>
                    <div style="margin-bottom: 15px; padding: 10px; background: #f1f5f9; border-radius: 8px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
                        <div style="display: flex; gap: 10px; align-items: center;">
                            <label style="font-size: 0.85rem; font-weight: bold;">Importar CSV/JSON:</label>
                            <input type="file" id="csvFile" accept=".csv,.json" style="width: auto;">
                            <button id="btnImportCSV" class="secondary" onclick="importCSV()">Subir Arquivo</button>
                        </div>
                        <div style="margin-left: auto; display: flex; gap: 10px;">
                            <button onclick="toggleFilter()" class="secondary" style="background: #eff6ff; border-color: #bfdbfe;">🔍 Filtrar</button>
                            <button onclick="downloadBackup('json')" class="secondary" style="background: #e0f2fe; border-color: #bae6fd;">💾 Backup (JSON)</button>
                            <button onclick="downloadBackup('csv')" class="secondary" style="background: #f0fdf4; border-color: #bbf7d0;">📊 Planilha (CSV)</button>
                        </div>
                        <span id="importLoading" class="hidden" style="font-size: 0.85rem; color: var(--primary); font-weight: bold; width: 100%;">⌛ Carregando...</span>
                    </div>

                    <!-- SEÇÃO DE FILTRO (OCULTA POR PADRÃO) -->
                    <div id="filterSection" class="hidden" style="margin-bottom: 15px; padding: 15px; background: white; border: 1px solid #e2e8f0; border-radius: 8px;">
                        <div class="form-row">
                            <div class="form-group">
                                <label>Data Inicial</label>
                                <input type="date" id="filter_start" value="2000-01-01">
                            </div>
                            <div class="form-group">
                                <label>Data Final</label>
                                <input type="date" id="filter_end">
                            </div>
                            <div class="form-group">
                                <label>Marcador</label>
                                <select id="filter_marker">
                                    <option value="">Todos</option>
                                </select>
                            </div>
                            <div style="display: flex; gap: 5px;">
                                <button onclick="applyFilters()" class="main" style="margin:0">Aplicar</button>
                                <button onclick="clearFilters()" class="secondary">Limpar</button>
                            </div>
                        </div>
                    </div>

                    <table>
                        <thead>
                            <tr>
                                <th style="width: 30px;"><input type="checkbox" id="selectAll" onclick="toggleSelectAll()"></th>
                                <th onclick="sortExams('date')">Data <span id="sort-date"></span></th>
                                <th onclick="sortExams('marker_name')">Marcador <span id="sort-marker_name"></span></th>
                                <th onclick="sortExams('value')">Valor <span id="sort-value"></span></th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="examTableBody"></tbody>
                    </table>

                    <!-- AÇÕES EM MASSA (AGORA ABAIXO DA TABELA) -->
                    <div id="bulkActions" class="hidden" style="margin-top: 15px; padding: 10px; background: #fefce8; border: 1px solid #fef08a; border-radius: 8px; display: flex; gap: 10px; align-items: center;">
                        <span style="font-size: 0.85rem; font-weight: bold;">Com selecionados:</span>
                        <select id="bulk_new_marker" style="font-size: 0.85rem; padding: 4px;">
                            <option value="">Alterar Marcador para...</option>
                        </select>
                        <button onclick="bulkEditMarker()" class="secondary" style="background: var(--primary); color: white; border: none;">Alterar Marcador</button>
                        <button onclick="clearSelection()" class="secondary">Cancelar</button>
                    </div>
                </div>
            </div>

            <!-- ABA MARCADORES -->
            <div id="tab-markers" class="hidden">
                <div class="card">
                    <h3 id="markerFormTitle">Cadastrar Novo Marcador</h3>
                    <form id="markerForm" class="form-row">
                        <input type="hidden" id="edit_marker_id">
                        <div class="form-group">
                            <label>Nome (ex: Vitamina D)</label>
                            <input type="text" id="m_name" required>
                        </div>
                        <div class="form-group">
                            <label>Mínimo Ref.</label>
                            <input type="number" step="0.01" id="m_min">
                        </div>
                        <div class="form-group">
                            <label>Máximo Ref.</label>
                            <input type="number" step="0.01" id="m_max">
                        </div>
                        <button type="submit" class="main" id="m_submit">Cadastrar</button>
                        <button type="button" class="secondary hidden" id="m_cancel" onclick="cancelMarkerEdit()">Cancelar</button>
                    </form>

                    <table>
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>Mínimo</th>
                                <th>Máximo</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="markerTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
        </div>
    </div>

    <button onclick="dangerResetDB()" style="position: fixed; bottom: 10px; right: 10px; background: none; border: none; color: #cbd5e1; font-size: 0.6rem; cursor: pointer; text-decoration: underline;">Limpar Tudo</button>

    <script>
        if (typeof ChartAnnotation !== 'undefined') Chart.register(ChartAnnotation);
        Chart.register(ChartDataLabels);
        
        let currentUser = JSON.parse(localStorage.getItem('user')) || null;

        let markers = [];
        let allExams = [];
        let filteredExams = [];
        let sortConfig = { column: 'date', direction: 'desc' };
        let activeFilters = { start: '', end: '', marker: '' };

        // Wrapper para Fetch com Header de Usuário
        async function apiFetch(url, options = {}) {
            if (!currentUser) return logout();
            
            options.headers = {
                ...options.headers,
                'X-User-ID': currentUser.user_id
            };
            
            const res = await fetch(url, options);
            if (res.status === 401) return logout();
            return res;
        }

        function checkAuth() {
            console.log("Verificando autenticação...", currentUser);
            const overlay = document.getElementById('login-overlay');
            const userDisplay = document.getElementById('user-display');
            const mainContent = document.getElementById('main-content');
            
            if (!currentUser) {
                overlay.classList.remove('hidden');
                overlay.style.display = 'flex'; // Garante que apareça
                userDisplay.classList.add('hidden');
                if (mainContent) mainContent.classList.add('hidden');
            } else {
                console.log("Usuário logado, escondendo overlay...");
                overlay.classList.add('hidden');
                overlay.style.display = 'none'; // Força o desaparecimento
                userDisplay.classList.remove('hidden');
                if (mainContent) {
                    mainContent.classList.remove('hidden');
                    mainContent.style.display = 'block'; // Garante visibilidade
                }
                document.getElementById('current-user-name').innerText = currentUser.name;
                loadMarkers().then(loadExams);
            }
        }

        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            console.log("Tentativa de login iniciada...");
            const submitBtn = document.getElementById('login_submit');
            const name = document.getElementById('login_user').value;
            const password = document.getElementById('login_pass').value;
            
            submitBtn.disabled = true;
            submitBtn.innerText = 'Entrando...';

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, password })
                });
                
                console.log("Resposta do servidor recebida:", res.status);
                const data = await res.json();
                if (res.ok) {
                    console.log("Login bem-sucedido, salvando usuário...");
                    currentUser = data;
                    localStorage.setItem('user', JSON.stringify(data));
                    checkAuth();
                } else {
                    console.error("Falha no login:", data.detail);
                    alert('Erro: ' + (data.detail || 'Usuário ou senha inválidos'));
                    document.getElementById('login_pass').value = '';
                }
            } catch (error) {
                console.error("Erro na requisição:", error);
                alert('Erro na conexão com o servidor.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = 'Entrar';
            }
        };

        function logout() {
            localStorage.removeItem('user');
            currentUser = null;
            location.reload();
        }

        function toggleFilter() {
            document.getElementById('filterSection').classList.toggle('hidden');
        }

        function applyFilters() {
            activeFilters.start = document.getElementById('filter_start').value;
            activeFilters.end = document.getElementById('filter_end').value;
            activeFilters.marker = document.getElementById('filter_marker').value;
            renderExamTable();
        }

        function clearFilters() {
            document.getElementById('filter_start').value = '2000-01-01';
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('filter_end').value = today;
            document.getElementById('filter_marker').value = '';
            activeFilters = { start: '2000-01-01', end: today, marker: '' };
            renderExamTable();
        }

        function toggleSelectAll() {
            const isChecked = document.getElementById('selectAll').checked;
            document.querySelectorAll('.exam-checkbox').forEach(cb => {
                cb.checked = isChecked;
            });
            updateBulkActionsVisibility();
        }

        function updateBulkActionsVisibility() {
            const selected = document.querySelectorAll('.exam-checkbox:checked').length;
            document.getElementById('bulkActions').classList.toggle('hidden', selected === 0);
        }

        function clearSelection() {
            document.getElementById('selectAll').checked = false;
            document.querySelectorAll('.exam-checkbox').forEach(cb => cb.checked = false);
            updateBulkActionsVisibility();
        }

        async function bulkEditMarker() {
            const newMarker = document.getElementById('bulk_new_marker').value;
            if (!newMarker) return alert('Selecione o marcador de destino');
            
            const selectedIds = Array.from(document.querySelectorAll('.exam-checkbox:checked'))
                .map(cb => parseInt(cb.value));
            
            if (!confirm(`Deseja alterar o marcador de ${selectedIds.length} registros para ${newMarker}?`)) return;

            const res = await apiFetch('/api/exams/bulk-update-marker', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ exam_ids: selectedIds, new_marker_name: newMarker })
            });

            if (res.ok) {
                alert('Atualização concluída com sucesso!');
                clearSelection();
                loadExams();
            } else {
                const err = await res.json();
                alert('Erro: ' + (err.detail || 'Falha na atualização'));
            }
        }

        function sortExams(column) {
            if (sortConfig.column === column) {
                sortConfig.direction = sortConfig.direction === 'asc' ? 'desc' : 'asc';
            } else {
                sortConfig.column = column;
                sortConfig.direction = 'asc';
            }
            
            allExams.sort((a, b) => {
                let valA = a[column];
                let valB = b[column];
                
                if (column === 'value') {
                    valA = parseFloat(valA);
                    valB = parseFloat(valB);
                }
                
                if (valA < valB) return sortConfig.direction === 'asc' ? -1 : 1;
                if (valA > valB) return sortConfig.direction === 'asc' ? 1 : -1;
                return 0;
            });
            
            renderExamTable();
        }

        function showTab(tab) {
            ['dashboard', 'exams', 'markers'].forEach(t => {
                document.getElementById(`tab-${t}`).classList.toggle('hidden', t !== tab);
                document.getElementById(`btn-${t}`).classList.toggle('active', t === tab);
            });
            if (tab === 'dashboard') loadExams();
            if (tab === 'exams') loadExams();
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const [year, month, day] = dateStr.split('-');
            return `${day}/${month}/${year}`;
        }

        async function loadMarkers() {
            const res = await apiFetch('/api/markers');
            markers = await res.json();
            
            // Preenche todos os seletores de marcadores
            const markerOptions = markers.map(m => `<option value="${m.name}">${m.name}</option>`).join('');
            
            document.getElementById('exam_marker').innerHTML = '<option value="">Selecione...</option>' + markerOptions;
            document.getElementById('filter_marker').innerHTML = '<option value="">Todos</option>' + markerOptions;
            document.getElementById('bulk_new_marker').innerHTML = '<option value="">Alterar Marcador para...</option>' + markerOptions;
            
            const tbody = document.getElementById('markerTableBody');
            tbody.innerHTML = markers.map(m => `
                <tr>
                    <td><strong>${m.name}</strong></td>
                    <td>${m.min_value ?? '-'}</td>
                    <td>${m.max_value ?? '-'}</td>
                    <td>
                        <button class="secondary" onclick="editMarker(${m.id}, '${m.name}', ${m.min_value}, ${m.max_value})">Editar</button>
                        <button class="secondary" style="color: #ef4444" onclick="deleteMarker(${m.id})">Excluir</button>
                    </td>
                </tr>
            `).join('');
        }

        async function loadExams() {
            const res = await apiFetch('/api/exams');
            allExams = await res.json();
            
            if (sortConfig.column !== 'date' || sortConfig.direction !== 'desc') {
                const col = sortConfig.column;
                const dir = sortConfig.direction;
                allExams.sort((a, b) => {
                    let valA = a[col];
                    let valB = b[col];
                    if (col === 'value') { valA = parseFloat(valA); valB = parseFloat(valB); }
                    if (valA < valB) return dir === 'asc' ? -1 : 1;
                    if (valA > valB) return dir === 'asc' ? 1 : -1;
                    return 0;
                });
            }

            renderExamTable();
            renderCharts();
        }

        function renderExamTable() {
            // Aplicar Filtros
            filteredExams = allExams.filter(e => {
                const matchStart = !activeFilters.start || e.date >= activeFilters.start;
                const matchEnd = !activeFilters.end || e.date <= activeFilters.end;
                const matchMarker = !activeFilters.marker || e.marker_name === activeFilters.marker;
                return matchStart && matchEnd && matchMarker;
            });

            // Identificar duplicatas visíveis para destaque
            const counts = {};
            filteredExams.forEach(e => {
                const key = `${e.date}|${e.marker_name}|${e.value}`;
                counts[key] = (counts[key] || 0) + 1;
            });

            // Atualiza indicadores visuais nos cabeçalhos
            ['date', 'marker_name', 'value'].forEach(col => {
                const el = document.getElementById(`sort-${col}`);
                if (el) {
                    el.innerText = sortConfig.column === col ? (sortConfig.direction === 'asc' ? ' 🔼' : ' 🔽') : '';
                }
            });

            const tbody = document.getElementById('examTableBody');
            tbody.innerHTML = filteredExams.map(e => {
                const key = `${e.date}|${e.marker_name}|${e.value}`;
                const isDuplicate = counts[key] > 1;
                return `
                    <tr class="${isDuplicate ? 'duplicate-highlight' : ''}">
                        <td><input type="checkbox" class="exam-checkbox" value="${e.id}" onchange="updateBulkActionsVisibility()"></td>
                        <td>${formatDate(e.date)}</td>
                        <td>${e.marker_name}</td>
                        <td>${e.value}</td>
                        <td>
                            <button class="secondary" onclick="editExam(${e.id}, '${e.date}', '${e.marker_name}', ${e.value})">Editar</button>
                            <button class="secondary" style="color: #ef4444" onclick="deleteExam(${e.id})">Excluir</button>
                        </td>
                    </tr>
                `;
            }).join('');
            
            // Resetar "Selecionar Todos"
            document.getElementById('selectAll').checked = false;
            updateBulkActionsVisibility();
        }

        function editExam(id, date, marker, value) {
            document.getElementById('edit_exam_id').value = id;
            document.getElementById('exam_date').value = date;
            document.getElementById('exam_marker').value = marker;
            document.getElementById('exam_value').value = value;
            document.getElementById('examFormTitle').innerText = 'Editar Registro';
            document.getElementById('exam_submit').innerText = 'Atualizar';
            document.getElementById('exam_cancel').classList.remove('hidden');
            window.scrollTo(0, 0);
        }

        function cancelExamEdit() {
            document.getElementById('examForm').reset();
            document.getElementById('edit_exam_id').value = '';
            document.getElementById('examFormTitle').innerText = 'Novo Registro de Exame';
            document.getElementById('exam_submit').innerText = 'Salvar';
            document.getElementById('exam_cancel').classList.add('hidden');
        }

        async function deleteExam(id) {
            if (confirm('Deseja excluir este registro?')) {
                await apiFetch(`/api/exams/${id}`, { method: 'DELETE' });
                loadExams();
            }
        }

        function editMarker(id, name, min, max) {
            document.getElementById('edit_marker_id').value = id;
            document.getElementById('m_name').value = name;
            document.getElementById('m_min').value = min;
            document.getElementById('m_max').value = max;
            document.getElementById('markerFormTitle').innerText = 'Editar Marcador';
            document.getElementById('m_submit').innerText = 'Atualizar';
            document.getElementById('m_cancel').classList.remove('hidden');
            window.scrollTo(0, 0);
        }

        function cancelMarkerEdit() {
            document.getElementById('markerForm').reset();
            document.getElementById('edit_marker_id').value = '';
            document.getElementById('markerFormTitle').innerText = 'Cadastrar Novo Marcador';
            document.getElementById('m_submit').innerText = 'Cadastrar';
            document.getElementById('m_cancel').classList.add('hidden');
        }

        async function deleteMarker(id) {
            if (confirm('Isso excluirá todos os exames deste marcador. Continuar?')) {
                await apiFetch(`/api/markers/${id}`, { method: 'DELETE' });
                loadMarkers();
                loadExams();
            }
        }

        async function importCSV() {
            const fileInput = document.getElementById('csvFile');
            const btnImport = document.getElementById('btnImportCSV');
            const loadingSpan = document.getElementById('importLoading');

            if (!fileInput.files.length) return alert('Selecione um arquivo primeiro.');
            
            const file = fileInput.files[0];
            const isJson = file.name.endsWith('.json');
            const endpoint = isJson ? '/api/import-json' : '/api/import-csv';
            
            const formData = new FormData();
            formData.append('file', file);

            btnImport.disabled = true;
            loadingSpan.classList.remove('hidden');

            try {
                const res = await apiFetch(endpoint, { method: 'POST', body: formData });
                const result = await res.json();
                
                if (res.ok) {
                    if (isJson) {
                        alert(`Backup restaurado!\nMarcadores: ${result.markers_imported}\nExames: ${result.exams_imported}`);
                    } else {
                        alert(`Sucesso! ${result.imported} registros importados.`);
                    }
                    await loadMarkers();
                    await loadExams();
                    fileInput.value = '';
                } else {
                    alert('Erro na importação: ' + result.detail);
                }
            } catch (error) {
                alert('Erro na conexão com o servidor.');
            } finally {
                btnImport.disabled = false;
                loadingSpan.classList.add('hidden');
            }
        }

        function downloadBackup(format) {
            const url = format === 'json' ? '/api/export-json' : '/api/export-csv';
            // Para downloads via APIFetch, precisamos de uma abordagem diferente pois o navegador não envia headers customizados em window.location
            apiFetch(url).then(res => res.blob()).then(blob => {
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = format === 'json' ? 'blood_exams_backup.json' : 'blood_exams.csv';
                a.click();
            });
        }

        document.getElementById('markerForm').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('edit_marker_id').value;
            const data = {
                name: document.getElementById('m_name').value,
                min_value: parseFloat(document.getElementById('m_min').value) || null,
                max_value: parseFloat(document.getElementById('m_max').value) || null
            };
            
            const url = id ? `/api/markers/${id}` : '/api/markers';
            const method = id ? 'PUT' : 'POST';

            const res = await apiFetch(url, { method, headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data)});
            
            if (res.ok) {
                cancelMarkerEdit();
                loadMarkers();
                loadExams(); // Recarrega exames pois o nome pode ter mudado
            } else {
                const err = await res.json();
                alert('Erro: ' + (err.detail || 'Falha ao salvar marcador'));
            }
        };

        document.getElementById('examForm').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('edit_exam_id').value;
            const data = {
                date: document.getElementById('exam_date').value,
                marker_name: document.getElementById('exam_marker').value,
                value: parseFloat(document.getElementById('exam_value').value)
            };
            
            const url = id ? `/api/exams/${id}` : '/api/exams';
            const method = id ? 'PUT' : 'POST';

            await apiFetch(url, { method, headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data)});
            cancelExamEdit();
            loadExams();
        };

        function toggleAllCharts(collapse) {
            document.querySelectorAll('.chart-content').forEach(content => {
                const markerName = content.id.replace('content-', '');
                if (collapse) {
                    content.classList.add('collapsed');
                    document.getElementById(`icon-${markerName}`).innerText = '➕';
                } else {
                    content.classList.remove('collapsed');
                    document.getElementById(`icon-${markerName}`).innerText = '➖';
                }
            });
        }

        function toggleChart(markerName) {
            const content = document.getElementById(`content-${markerName}`);
            const icon = document.getElementById(`icon-${markerName}`);
            const isCollapsed = content.classList.toggle('collapsed');
            icon.innerText = isCollapsed ? '➕' : '➖';
        }

        function renderCharts() {
            const container = document.getElementById('chartsContainer');
            container.innerHTML = `
                <div class="controls-row">
                    <button class="secondary" onclick="toggleAllCharts(true)">📁 Minimizar Todos</button>
                    <button class="secondary" onclick="toggleAllCharts(false)">📂 Expandir Todos</button>
                </div>
            `;
            
            const sortedExams = [...allExams].sort((a, b) => a.date.localeCompare(b.date));
            const grouped = sortedExams.reduce((acc, curr) => {
                if (!acc[curr.marker_name]) acc[curr.marker_name] = [];
                acc[curr.marker_name].push(curr);
                return acc;
            }, {});

            const sortedMarkerNames = Object.keys(grouped).sort();

            for (const markerName of sortedMarkerNames) {
                const records = grouped[markerName];
                const markerInfo = markers.find(m => m.name === markerName);
                
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="chart-header" onclick="toggleChart('${markerName}')">
                        <h3 style="margin:0">${markerName}</h3>
                        <span id="icon-${markerName}" style="font-size: 1.2rem;">➖</span>
                    </div>
                    <div id="content-${markerName}" class="chart-content">
                        <canvas id="chart-${markerName}" style="margin-top:15px"></canvas>
                    </div>
                `;
                container.appendChild(card);

                const annotations = {};
                if (markerInfo && markerInfo.min_value !== null && markerInfo.max_value !== null) {
                    annotations.refBox = { type: 'box', yMin: markerInfo.min_value, yMax: markerInfo.max_value, backgroundColor: 'rgba(34, 197, 94, 0.15)', borderWidth: 0, label: { content: 'Normal', display: true, position: 'start', font: { size: 10 } } };
                    annotations.lowBox = { type: 'box', yMin: 0, yMax: markerInfo.min_value, backgroundColor: 'rgba(239, 68, 68, 0.15)', borderWidth: 0 };
                    annotations.highBox = { type: 'box', yMin: markerInfo.max_value, yMax: 999999, backgroundColor: 'rgba(239, 68, 68, 0.15)', borderWidth: 0 };
                }

                new Chart(document.getElementById(`chart-${markerName}`).getContext('2d'), {
                    type: 'line',
                    data: {
                        labels: records.map(r => formatDate(r.date)),
                        datasets: [{ 
                            label: markerName, 
                            data: records.map(r => r.value), 
                            borderColor: '#2563eb', 
                            tension: 0.3, 
                            fill: false,
                            pointRadius: 4,
                            pointBackgroundColor: '#2563eb'
                        }]
                    },
                    options: { 
                        plugins: { 
                            annotation: { annotations },
                            datalabels: {
                                align: 'bottom',
                                anchor: 'center',
                                offset: 6,
                                color: '#475569',
                                font: { size: 10, weight: 'bold' }
                            }
                        },
                        layout: { padding: { top: 10, bottom: 20 } },
                        scales: { y: { suggestedMax: Math.max(...records.map(r => r.value), markerInfo?.max_value || 0) * 1.2, beginAtZero: false } }
                    }
                });
            }
        }

        async function dangerResetDB() {
            if (confirm('ATENÇÃO: Isso apagará TODOS os seus dados permanentemente. Continuar?')) {
                const res = await apiFetch('/api/danger-reset-db', { method: 'DELETE' });
                if (res.ok) {
                    alert('Seus dados foram resetados com sucesso.');
                    window.location.reload();
                } else {
                    alert('Erro ao resetar banco.');
                }
            }
        }

        function initDates() {
            const today = new Date().toISOString().split('T')[0];
            const filterEnd = document.getElementById('filter_end');
            if (filterEnd) filterEnd.value = today;
            activeFilters.start = '2000-01-01';
            activeFilters.end = today;
        }

        initDates();
        checkAuth();
    </script>
</body>
</html>
